services:
  app:
    build:
      context: .
      dockerfile: Dockerfile-Multistep
    deploy:
      replicas: 4
    ports:
      - "8080-8083:8080"
    environment:
      HOTEL_MONGO_URI: mongodb://mongo:27017/hotel
    depends_on:
      - mongo
    networks:
      - backend

  mongo:
    image: mongo:7
    container_name: mongodb
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - backend

  nginx:
    image: nginx:latest
    ports:
      - "3000:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    networks:
      - backend

volumes:
  mongo_data:

networks:
  backend:
    driver: bridge